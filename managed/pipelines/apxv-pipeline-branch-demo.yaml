apiVersion: apxv.pipeline/v0.1
kind: Pipeline
id: apxv-pipeline-branch-demo
name: "Branch on success path"
version: 0.1.0
steps:
  - id: redact
    name: Redact
    uses: "agent:APXV-AGENT-001"
    next_on_success: decide
    layout:
      x: 40
      y: 40
  - id: optional_llm
    name: "Optional LLM (skipped by jump)"
    uses: "agent:APXV-AGENT-LLM-001"
    when: previous_succeeded
    layout:
      x: 40
      y: 140
  - id: decide
    name: "Orchestrate then attest"
    uses: "agent:APXV-AGENT-002"
    layout:
      x: 240
      y: 40
  - id: attest_coord
    name: "Attestation coordination"
    uses: "agent:APXV-AGENT-003"
    layout:
      x: 440
      y: 40
description: |
    Example using next_on_success to skip optional steps (graph-lite). Maturity Example — Workshop v1.7.
    
defaults:
  on_step_failure: stop
