# Overlay: nginx APXV UI on http://127.0.0.1:5173 (proxies /api to apxv:8741)
# Usage (from runtime/):
#   docker compose -f docker-compose.yml -f docker-compose.ui.yml up -d --build

services:
  apxv-ui:
    build:
      context: ..
      dockerfile: runtime/docker/Dockerfile.ui
    image: apxv-ui:latest
    container_name: apxv-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      apxv:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"