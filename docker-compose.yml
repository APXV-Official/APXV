services:
  apxv:
    build: .
    image: apxv:latest
    container_name: apxv
    restart: unless-stopped
    ports:
      - "127.0.0.1:8741:8741"
    volumes:
      - ./managed:/app/managed
      - ./rust/apxv-circuits/keys:/app/rust/apxv-circuits/keys
      - ./rust/apxv-zk/keys:/app/rust/apxv-zk/keys
    environment:
      - APXV_BASE_PATH=/app
      - APXV_CONTAINER_BIND=1
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8741/health', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"