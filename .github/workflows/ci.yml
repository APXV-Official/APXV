name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install package
        run: pip install -e ".[dev,voice]"
        env:
          APXV_VOICE_MODE: simulated

      - name: Build Rust workspace (release)
        working-directory: rust
        run: cargo build --release -p apxv-circuits -p apxv-zk

      - name: Run Rust tests
        working-directory: rust
        run: cargo test -p apxv-circuits -p apxv-zk -q

      - name: Sovereign bootstrap (CI profile)
        run: >
          python -m scripts.apxv_bootstrap
          --profile ci
          --skip-ollama
          --skip-voice
          --skip-smoke
          --skip-prover-build
        env:
          APXV_VOICE_MODE: simulated

      - name: Ceremony transcript (Tier B)
        run: |
          python -m scripts.ceremony_transcript --write --tier B --note "CI ubuntu-latest"
          python -m scripts.ceremony_transcript --verify

      - name: Doctor check (clean state)
        run: python -m scripts.apxv_doctor

      - name: Integrity check (clean state)
        run: python -m scripts.apxv_ctl integrity

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short
        env:
          APXV_VOICE_MODE: simulated
          APXV_PROFILE: ci