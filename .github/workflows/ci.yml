name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Build Rust workspace (release)
        working-directory: rust
        run: cargo build --release -p apx-circuits -p apx-zk

      - name: Run Rust tests
        working-directory: rust
        run: cargo test -p apx-circuits -p apx-zk -q

      - name: Setup first-run (with ZK)
        run: python -m scripts.setup_first_run

      - name: Doctor check (clean state)
        run: python -m scripts.apx_doctor

      - name: Integrity check (clean state)
        run: python -m scripts.apx_ctl integrity

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short