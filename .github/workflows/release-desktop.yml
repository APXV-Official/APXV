name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to attach installers to (must exist on remote)
        required: true
        default: v1.3.1
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - name: Build Rust provers
        working-directory: rust
        run: cargo build --release -p apxv-circuits -p apxv-zk

      - name: Build desktop installers (Windows)
        shell: pwsh
        env:
          APXV_SKIP_PROVER_BUILD: "1"
        run: ./scripts/build-desktop.ps1

      - name: Verify Windows installers
        shell: pwsh
        run: |
          $msi = Get-ChildItem ui/apps/desktop/src-tauri/target/release/bundle/msi/*.msi -ErrorAction Stop
          $setup = Get-ChildItem ui/apps/desktop/src-tauri/target/release/bundle/nsis/*setup.exe -ErrorAction Stop
          Write-Host "MSI: $($msi.FullName)"
          Write-Host "Setup: $($setup.FullName)"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            ui/apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            ui/apps/desktop/src-tauri/target/release/bundle/nsis/*setup.exe

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - name: Build Rust provers
        working-directory: rust
        run: cargo build --release -p apxv-circuits -p apxv-zk

      - name: Build desktop installers (Linux)
        env:
          APXV_SKIP_PROVER_BUILD: "1"
        run: bash scripts/build-desktop.sh

      - name: Verify Linux installers
        run: |
          ls -la ui/apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          ls -la ui/apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            ui/apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            ui/apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  publish:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: List release assets
        run: find release-assets -type f -ls

      - name: Extract changelog notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Missing CHANGELOG section for ${VERSION}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: APXV ${{ steps.tag.outputs.value }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-assets/**/*
          fail_on_unmatched_files: true