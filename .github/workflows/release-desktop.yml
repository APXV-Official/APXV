name: Release Desktop

# Do NOT use "Re-run failed jobs" on an old run — GitHub reuses that run's workflow YAML
# (including the broken VBScript DISM step on windows-latest). Always use "Run workflow"
# from the latest main branch after CI fixes land.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag to attach installers to (must exist on remote)
        required: true
        default: v1.3.1
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-desktop.yml"
      - "scripts/build-desktop.ps1"
      - "scripts/build-desktop.sh"
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    # windows-latest (Server 2025) removed VBScript as a DISM feature; WiX MSI needs windows-2022.
    runs-on: windows-2022
    timeout-minutes: 90
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Preflight (windows-2022 — stale re-runs still use old workflow YAML)
        shell: pwsh
        run: |
          Write-Host "Commit: $env:GITHUB_SHA"
          Write-Host "Runner ImageOS: $env:ImageOS"
          if ($env:ImageOS -ne "win22") {
            throw "Wrong runner ($env:ImageOS). Do not Re-run old failed jobs. Use Actions -> Release Desktop -> Run workflow from latest main."
          }

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Windows bundlers (WiX + NSIS)
        shell: pwsh
        run: |
          $wixBin = "C:\Program Files (x86)\WiX Toolset v3.14\bin"
          if (-not (Test-Path "$wixBin\candle.exe")) {
            choco install wixtoolset --version=3.14.0 -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "WiX Toolset install failed with exit code $LASTEXITCODE" }
          } else {
            Write-Host "WiX Toolset already installed at $wixBin"
          }
          if (-not (Test-Path "$wixBin\candle.exe")) { throw "candle.exe not found under $wixBin" }
          echo "$wixBin" >> $env:GITHUB_PATH
          Write-Host "WiX on PATH: $wixBin"

          $nsisRoot = "C:\Program Files (x86)\NSIS"
          if (-not (Test-Path "$nsisRoot\makensis.exe")) {
            choco install nsis -y --no-progress
            if ($LASTEXITCODE -ne 0) { throw "NSIS install failed with exit code $LASTEXITCODE" }
          } else {
            Write-Host "NSIS already installed at $nsisRoot"
          }
          if (-not (Test-Path "$nsisRoot\makensis.exe")) { throw "makensis.exe not found under $nsisRoot" }
          echo "$nsisRoot" >> $env:GITHUB_PATH
          Write-Host "NSIS on PATH: $nsisRoot"

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target

      - name: Build Rust provers
        working-directory: rust
        run: cargo build --release -p apxv-circuits -p apxv-zk

      # Use bash + explicit steps (same tauri invocation as green Linux job).
      # build-desktop.ps1 was exiting in ~1s on GHA without compiling — do not use it in CI.
      - name: Stage runtime payload (Windows)
        shell: bash
        run: bash scripts/stage-desktop-runtime.sh

      - name: Build web assets (Windows)
        working-directory: ui
        run: pnpm --filter @apxv/web build

      - name: Build Tauri installers (Windows)
        shell: bash
        working-directory: ui/apps/desktop
        env:
          APXV_SKIP_PROVER_BUILD: "1"
        run: |
          set -euo pipefail
          echo "tauri: $(pnpm exec -- tauri --version)"
          echo "candle: $(command -v candle.exe || true)"
          echo "makensis: $(command -v makensis.exe || true)"
          pnpm exec -- tauri build --verbose --bundles msi,nsis

      - name: Verify Windows installers
        shell: bash
        run: |
          set -euo pipefail
          BUNDLE="ui/apps/desktop/src-tauri/target/release/bundle"
          if [[ ! -d "$BUNDLE" ]]; then
            echo "Bundle directory missing. Contents of target/release:" >&2
            ls -la ui/apps/desktop/src-tauri/target/release || true
            exit 1
          fi
          find "$BUNDLE" -type f -ls
          ls -la "$BUNDLE/msi/"*.msi
          ls -la "$BUNDLE/nsis/"*setup.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            ui/apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            ui/apps/desktop/src-tauri/target/release/bundle/nsis/*setup.exe

  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install UI dependencies
        working-directory: ui
        run: pnpm install

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            rust -> target
            ui/apps/desktop/src-tauri -> target

      - name: Build Rust provers
        working-directory: rust
        run: cargo build --release -p apxv-circuits -p apxv-zk

      - name: Build desktop installers (Linux)
        env:
          APXV_SKIP_PROVER_BUILD: "1"
        run: bash scripts/build-desktop.sh

      - name: Verify Linux installers
        run: |
          ls -la ui/apps/desktop/src-tauri/target/release/bundle/deb/*.deb
          ls -la ui/apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux
          if-no-files-found: error
          path: |
            ui/apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            ui/apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  publish:
    needs: [build-windows, build-linux]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: List release assets
        run: find release-assets -type f -ls

      - name: Extract changelog notes
        id: notes
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Missing CHANGELOG section for ${VERSION}" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: APXV ${{ steps.tag.outputs.value }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          files: release-assets/**/*
          fail_on_unmatched_files: true